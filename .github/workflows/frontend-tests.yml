name: Frontend Tests

on:
  push:
    branches: [main, dev]
    paths:
      - "frontend/**"
  pull_request:
    branches: [main, dev]
    paths:
      - "frontend/**"

jobs:
  test:
    name: Run vitest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run tests
        run: npm test
        working-directory: frontend
